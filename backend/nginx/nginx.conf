upstream djangobnb_backend {
    server web:8000;
}

server {
    listen 80;
    server_name api.paudelsagun.com.np;
    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.paudelsagun.com.np;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/api.paudelsagun.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.paudelsagun.com.np/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://djangobnb_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /media/ {
        alias /usr/src/djangobnb_backend/media/;
    }

    location /static/ {
        alias /usr/src/djangobnb_backend/staticfiles/;
    }

    location ~^/ws/ {
        proxy_pass http://daphne:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}