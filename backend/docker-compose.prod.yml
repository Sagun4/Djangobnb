# version: '3.8'

services:
  nginx:
    build: ./nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./djangobnb_backend/media:/usr/src/djangobnb_backend/media
      - ./djangobnb_backend/staticfiles:/usr/src/djangobnb_backend/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
  web:
    build: ./djangobnb_backend
    command: gunicorn djangobnb_backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./djangobnb_backend/:/usr/src/djangobnb_backend
    expose:
      - "8000"
    env_file:
      - ./.env.dev
    depends_on:
      - db 
      - daphne
  daphne:
    build: ./djangobnb_backend
    command: daphne --bind 0.0.0.0 -p 8002 djangobnb_backend.asgi:application
    ports:
      - "8002:8002"
  db:
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres 
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=djangobnb
volumes:
  postgres_data:     

 


      